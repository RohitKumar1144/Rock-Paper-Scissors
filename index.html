<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
      Rock Papers Scissors
    </title>
    <link rel="stylesheet" href="rock-paper-scissors.css">
  </head>

  <body>
    <p class="title">
      Rock Paper Scissors
    </p>
    <button onclick="
      userPlay = 'Rock'
      compPlayed = compPlay();
      playGame(userPlay, compPlayed);
      bodyResult(result, userPlay, compPlayed);
    "
    class="move-button">
      <img src="images/rock-emoji.png" class="move-icon">
    </button>

    <button onclick="
      userPlay = 'Paper'
      compPlayed = compPlay();
      playGame(userPlay, compPlayed);
      bodyResult(result, userPlay, compPlayed);
    "
    class="move-button">
      <img src="images/paper-emoji.png" class="move-icon">
    </button>

    <button onclick="
      userPlay = 'Scissors'
      compPlayed = compPlay();
      playGame(userPlay, compPlayed);
      bodyResult(result, userPlay, compPlayed);
    "
    class="move-button">
      <img src="images/scissors-emoji.png" class="move-icon">
    </button>
    <p class="js-result result"></p>
    <p class="js-play play"></p>
    <p class="js-score score"></p>

    <button onclick="
      score.won =0;
      score.lose =0;
      score.tie =0;
      localStorage.removeItem('score');
      updateScore();
    " class="reset-score-button">
      Reset Score
    </button>
    
    <script src="rock-paper-scissors.js">

    </script>

  </body>

</html>
