<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
      Rock Papers Scissors
    </title>
    <link rel="stylesheet" href="styles/rock-paper-scissors.css">
  </head>

  <body>
    <p class="title">
      Rock Paper Scissors
    </p>
    <button
    class="move-button js-rock-button">
      <img src="images/rock-emoji.png" class="move-icon">
    </button>

    <button 
    class="move-button js-paper-button">
      <img src="images/paper-emoji.png" class="move-icon">
    </button>

    <button
    class="move-button js-scissors-button">
      <img src="images/scissors-emoji.png" class="move-icon">
    </button>
    <p class="js-result result"></p>
    <p class="js-play play"></p>
    <p class="js-score score"></p>

    <button class="reset-score-button js-reset-score-button">
      Reset Score
    </button>

    <button class="autoplay-button js-autoplay-button">
      Auto Play
    </button>

    <p class="js-confirm-reset-para">

    </p>
    
    <script src="scripts/rock-paper-scissors.js">

    </script>

  </body>

</html>
